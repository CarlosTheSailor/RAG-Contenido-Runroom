<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Newsletter LinkedIn Generator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fc;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #075985;
      --border: #d5deee;
      --accent: #0f766e;
    }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #e8eefc 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }
    .muted {
      color: var(--muted);
      margin: 4px 0 0;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-top: 4px;
      margin-bottom: 12px;
      font: inherit;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    button {
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .secondary {
      background: #334155;
    }
    .warn {
      border-left: 4px solid #dc2626;
      background: #fff1f2;
      color: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
      white-space: pre-wrap;
    }
    .ok {
      border-left: 4px solid var(--accent);
      background: #f0fdfa;
      color: #134e4a;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
      white-space: pre-wrap;
    }
    .ideas-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .idea-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background:
        radial-gradient(circle at top right, rgba(7, 89, 133, 0.08), transparent 40%),
        #fbfdff;
      min-height: 168px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .idea-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .idea-card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.35;
    }
    .idea-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      flex: 1;
    }
    .idea-meta {
      font-size: 0.86rem;
      color: var(--muted);
    }
    .idea-insert {
      width: 34px;
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      font-size: 1.1rem;
      line-height: 1;
    }
    .ideas-empty {
      color: var(--muted);
      padding: 8px 0;
    }
    .inline-note {
      display: none;
      margin-top: -4px;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 0.92rem;
    }
    pre {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f9fbff;
      padding: 12px;
      overflow: auto;
      max-height: 700px;
      white-space: pre-wrap;
    }
    ul {
      margin: 0;
      padding-left: 18px;
    }
    li {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="row">
      <div>
        <h1>Newsletter LinkedIn Generator</h1>
        <p class="muted">Sesión iniciada como {{ user.name }} ({{ user.email }})</p>
      </div>
      <div class="row">
        <a href="/app"><button class="secondary" type="button">Volver</button></a>
        <form action="/auth/logout" method="post">
          <button class="secondary" type="submit">Cerrar sesión</button>
        </form>
      </div>
    </header>

    <section class="panel">
      <div class="ideas-header">
        <div>
          <h2>Ideas del RAG</h2>
          <p class="muted">Diez temas de producto para arrancar más rápido sin salirte del corpus.</p>
        </div>
        <button id="reload-ideas" type="button">Recargar ideas</button>
      </div>
      <div id="ideas-status" class="ok" style="display: block;">Cargando ideas...</div>
      <div id="ideas-grid" class="ideas-grid"></div>
    </section>

    <section class="panel">
      <h2>Generar newsletter</h2>
      <form id="newsletter-form">
        <label>
          Idea (obligatorio)
          <textarea id="idea" rows="4" required placeholder="Escribe la idea central..."></textarea>
        </label>
        <div id="idea-copy-feedback" class="inline-note"></div>

        <div class="grid">
          <label>
            Referencias
            <textarea id="referencias" rows="3" placeholder="Enlaces, fuentes o notas..."></textarea>
          </label>
          <label>
            Audiencia
            <input id="audiencia" type="text" placeholder="Ej: managers de producto y negocio" />
          </label>
          <label>
            Objetivo secundario
            <input id="objetivo_secundario" type="text" placeholder="Ej: abrir debate sobre incentivos" />
          </label>
          <label>
            Longitud
            <input id="longitud" type="text" placeholder="Ej: 1200-1500 palabras" />
          </label>
          <label>
            Metáfora visual preferida
            <input id="metafora_visual" type="text" placeholder="Ej: tablero de control vs brújula" />
          </label>
          <label>
            Texto a incluir íntegramente
            <textarea id="texto_a_incluir" rows="3" placeholder="Pega aquí texto literal, si aplica..."></textarea>
          </label>
        </div>

        <label>
          <input id="offline_mode" type="checkbox" />
          Forzar modo offline (sin OpenAI)
        </label>

        <button type="submit">Generar newsletter</button>
      </form>
    </section>

    <section class="panel">
      <h2>Resultado</h2>
      <div id="warning-box" class="warn"></div>
      <div id="info-box" class="ok"></div>
      <pre id="output-text"></pre>
    </section>

    <section class="panel">
      <h2>Contenidos relacionados (RAG)</h2>
      <ul id="related-content"></ul>
    </section>
  </div>

  <script>
    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const body = await response.json();
      return { status: response.status, body };
    }

    const form = document.getElementById("newsletter-form");
    const ideaInput = document.getElementById("idea");
    const reloadIdeasButton = document.getElementById("reload-ideas");
    const ideasStatus = document.getElementById("ideas-status");
    const ideasGrid = document.getElementById("ideas-grid");
    const ideaCopyFeedback = document.getElementById("idea-copy-feedback");
    const outputText = document.getElementById("output-text");
    const warningBox = document.getElementById("warning-box");
    const infoBox = document.getElementById("info-box");
    const relatedList = document.getElementById("related-content");
    let seenTopicIds = [];
    let resetIdeasOnNextReload = false;

    function showIdeasStatus(message, isWarning = false) {
      ideasStatus.textContent = message;
      ideasStatus.className = isWarning ? "warn" : "ok";
      ideasStatus.style.display = "block";
    }

    function renderIdeas(ideas) {
      ideasGrid.innerHTML = "";
      if (!Array.isArray(ideas) || ideas.length === 0) {
        const empty = document.createElement("div");
        empty.className = "ideas-empty";
        empty.textContent = "No hay ideas disponibles con los filtros actuales.";
        ideasGrid.appendChild(empty);
        return;
      }

      for (const idea of ideas) {
        const card = document.createElement("article");
        card.className = "idea-card";

        const head = document.createElement("div");
        head.className = "idea-card-head";

        const title = document.createElement("h3");
        title.textContent = idea.title || "Tema sin título";
        head.appendChild(title);

        const insert = document.createElement("button");
        insert.type = "button";
        insert.className = "idea-insert";
        insert.textContent = "+";
        insert.title = "Usar idea";
        insert.setAttribute("aria-label", "Usar idea");
        insert.addEventListener("click", () => {
          ideaInput.value = idea.canonical_text || "";
          ideaInput.focus();
          ideaCopyFeedback.textContent = `Idea cargada: ${idea.title || "Tema"}`;
          ideaCopyFeedback.style.display = "block";
        });
        head.appendChild(insert);

        const preview = document.createElement("p");
        preview.textContent = idea.context_preview || "Sin contexto adicional.";

        const meta = document.createElement("div");
        meta.className = "idea-meta";
        const score = Number(idea.score || 0).toFixed(2);
        const dateRaw = idea.last_seen_at ? String(idea.last_seen_at).slice(0, 10) : "sin fecha";
        meta.textContent = `Score ${score} · ${dateRaw}`;

        card.appendChild(head);
        card.appendChild(preview);
        card.appendChild(meta);
        ideasGrid.appendChild(card);
      }
    }

    async function loadIdeas({ resetCycle = false } = {}) {
      if (resetCycle) {
        seenTopicIds = [];
        resetIdeasOnNextReload = false;
      }

      reloadIdeasButton.disabled = true;
      showIdeasStatus("Cargando ideas...");
      ideasGrid.innerHTML = "";

      const payload = {
        exclude_topic_ids: seenTopicIds,
        limit: 10,
        offline_mode: document.getElementById("offline_mode").checked,
      };

      const result = await postJson("/app/api/newsletters-linkedin/ideas", payload);
      reloadIdeasButton.disabled = false;

      if (result.status !== 200) {
        showIdeasStatus("No se pudieron cargar ideas del RAG.", true);
        ideasGrid.innerHTML = "";
        return;
      }

      const ideas = Array.isArray(result.body.ideas) ? result.body.ideas : [];
      for (const idea of ideas) {
        if (typeof idea.topic_id === "number" && !seenTopicIds.includes(idea.topic_id)) {
          seenTopicIds.push(idea.topic_id);
        }
      }

      renderIdeas(ideas);

      if (result.body.pool_exhausted || ideas.length < 10) {
        resetIdeasOnNextReload = true;
        showIdeasStatus(
          "Se ha agotado el pool de ideas sin repetir. La siguiente recarga reiniciará el ciclo."
        );
        return;
      }

      showIdeasStatus("Ideas listas. Usa + para copiar una al campo de idea.");
    }

    reloadIdeasButton.addEventListener("click", async () => {
      ideaCopyFeedback.style.display = "none";
      await loadIdeas({ resetCycle: resetIdeasOnNextReload });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      warningBox.style.display = "none";
      infoBox.style.display = "none";
      relatedList.innerHTML = "";
      outputText.textContent = "Generando...";

      const payload = {
        idea: ideaInput.value,
        referencias: document.getElementById("referencias").value || null,
        audiencia: document.getElementById("audiencia").value || null,
        objetivo_secundario: document.getElementById("objetivo_secundario").value || null,
        longitud: document.getElementById("longitud").value || null,
        metafora_visual: document.getElementById("metafora_visual").value || null,
        texto_a_incluir: document.getElementById("texto_a_incluir").value || null,
        offline_mode: document.getElementById("offline_mode").checked,
      };

      const result = await postJson("/app/api/newsletters-linkedin/generate", payload);
      if (result.status !== 200) {
        warningBox.textContent = JSON.stringify(result.body, null, 2);
        warningBox.style.display = "block";
        outputText.textContent = "";
        return;
      }

      const warnings = Array.isArray(result.body.warnings) ? result.body.warnings : [];
      if (warnings.length > 0) {
        warningBox.textContent = warnings.join("\n");
        warningBox.style.display = "block";
      }

      const usedExamples = Array.isArray(result.body.used_examples) ? result.body.used_examples : [];
      infoBox.textContent = usedExamples.length > 0
        ? `Ejemplos usados: ${usedExamples.join(", ")}`
        : "No se han usado ejemplos de estilo.";
      infoBox.style.display = "block";

      outputText.textContent = result.body.output_text || "";
      const related = Array.isArray(result.body.related_content) ? result.body.related_content : [];
      if (related.length === 0) {
        relatedList.innerHTML = "<li>No hay contenidos relacionados para esta ejecución.</li>";
        return;
      }
      for (const item of related) {
        const li = document.createElement("li");
        const link = item.url ? `\nURL: ${item.url}` : "";
        const excerpt = item.excerpt ? `\nExtracto: ${item.excerpt}` : "";
        li.textContent = `[${item.content_type}] ${item.title} (score ${Number(item.score).toFixed(4)})${link}${excerpt}`;
        relatedList.appendChild(li);
      }
    });

    loadIdeas({ resetCycle: true });
  </script>
</body>
</html>
